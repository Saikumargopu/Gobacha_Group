name: Build and Deploy to Azure App Service (UAT only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      DEPLOYMENT_VERSION: "1.0.6"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET (latest LTS)
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 'lts'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-package-${{ env.DEPLOYMENT_VERSION }}
          path: ./publish

  deploy-uat:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: app-package-${{ env.DEPLOYMENT_VERSION }}

      - name: Deploy to UAT
        uses: azure/webapps-deploy@v2
        with:
          app-name: Gobacha-UAT
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_UAT }}
          package: ./app-package-${{ env.DEPLOYMENT_VERSION }}
